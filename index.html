<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入职教师课标测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f6fa;
  color: #333;
  min-height: 100vh;
}
/* Home */
.home-container {
  max-width: 720px; margin: 0 auto; padding: 40px 20px;
}
.home-header {
  text-align: center; margin-bottom: 40px;
}
.home-header h1 {
  font-size: 28px; color: #1a1a2e; margin-bottom: 8px;
}
.home-header p {
  font-size: 15px; color: #666;
}
.subject-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}
.subject-card {
  background: #fff; border-radius: 12px; padding: 28px 20px;
  text-align: center; cursor: pointer; transition: all 0.25s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 2px solid transparent;
  text-decoration: none; color: inherit; display: block;
}
.subject-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  border-color: #4a6cf7;
}
.subject-card .icon {
  font-size: 40px; margin-bottom: 10px;
}
.subject-card .name {
  font-size: 20px; font-weight: 700; color: #1a1a2e;
}
.subject-card .info {
  font-size: 13px; color: #999; margin-top: 6px;
}
/* Test */
.test-container {
  max-width: 800px; margin: 0 auto; padding: 30px 20px 60px;
}
.test-header {
  background: #fff; border-radius: 12px; padding: 24px 28px;
  margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.test-header h2 {
  font-size: 22px; color: #1a1a2e;
}
.test-header .back-btn {
  background: #eef0f7; border: none; padding: 8px 18px;
  border-radius: 8px; cursor: pointer; font-size: 14px; color: #555;
  transition: background 0.2s;
}
.test-header .back-btn:hover { background: #dde0eb; }
.section {
  background: #fff; border-radius: 12px; padding: 24px 28px;
  margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.section-title {
  font-size: 17px; font-weight: 700; color: #4a6cf7;
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 2px solid #eef0f7;
}
.question {
  margin-bottom: 22px; padding-bottom: 18px;
  border-bottom: 1px dashed #eee;
}
.question:last-child { border-bottom: none; margin-bottom: 0; }
.question .q-title {
  font-size: 15px; font-weight: 600; color: #333; margin-bottom: 10px;
}
.question .q-score {
  font-size: 12px; color: #999; font-weight: 400;
  margin-left: 6px;
}
.question .q-info {
  font-size: 12px; color: #999; margin-bottom: 6px;
}
.options label {
  display: block; padding: 8px 12px; margin: 4px 0;
  border-radius: 8px; cursor: pointer; transition: background 0.15s;
  font-size: 14px;
}
.options label:hover { background: #f0f4ff; }
.options input[type="radio"] { margin-right: 8px; }
.input-field {
  width: 100%; padding: 10px 14px; border: 1.5px solid #ddd;
  border-radius: 8px; font-size: 14px; transition: border-color 0.2s;
  font-family: inherit;
}
.input-field:focus { outline: none; border-color: #4a6cf7; }
textarea.input-field { min-height: 100px; resize: vertical; }
.submit-wrap {
  text-align: center; margin: 30px 0;
}
.submit-btn {
  background: #4a6cf7; color: #fff; border: none;
  padding: 14px 48px; border-radius: 10px; font-size: 17px;
  cursor: pointer; font-weight: 600; transition: all 0.25s;
}
.submit-btn:hover { background: #3b5de7; transform: translateY(-1px); }
.submit-btn:disabled { background: #bbb; cursor: not-allowed; transform: none; }
/* Result */
.result-box {
  background: #fff; border-radius: 12px; padding: 28px;
  margin-top: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  text-align: center;
}
.result-box h3 { font-size: 22px; margin-bottom: 12px; }
.result-score {
  font-size: 48px; font-weight: 800; color: #4a6cf7;
  margin: 10px 0;
}
.result-detail {
  font-size: 14px; color: #666; margin-top: 8px;
}
.result-detail span { font-weight: 600; }
.correct { color: #27ae60; }
.wrong { color: #e74c3c; }
.ref-answer {
  margin-top: 20px; padding: 16px; background: #f8f9fc;
  border-radius: 8px; text-align: left;
}
.ref-answer h4 { font-size: 15px; margin-bottom: 8px; color: #555; }
.ref-item {
  margin-bottom: 12px; padding-bottom: 10px;
  border-bottom: 1px solid #eee;
}
.ref-item:last-child { border-bottom: none; }
.ref-q { font-weight: 600; font-size: 14px; }
.ref-a { font-size: 13px; color: #666; margin-top: 4px; }
.correction-item {
  margin: 6px 0; font-size: 13px;
}
/* Responsive */
@media (max-width: 600px) {
  .home-header h1 { font-size: 22px; }
  .subject-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .subject-card { padding: 20px 12px; }
  .subject-card .name { font-size: 17px; }
  .test-container { padding: 16px 10px 40px; }
  .section, .test-header { padding: 16px; }
  .result-score { font-size: 36px; }
}

/* Admin */
.admin-entry {
  text-align: center; margin-top: 30px; padding-bottom: 40px;
}
.admin-entry a {
  color: #aaa; font-size: 12px; text-decoration: none;
  border-bottom: 1px dashed #ccc;
  transition: color 0.2s;
}
.admin-entry a:hover { color: #666; }
/* Dashboard */
.dash-container {
  max-width: 960px; margin: 0 auto; padding: 30px 20px 60px;
}
.dash-header {
  background: #fff; border-radius: 12px; padding: 20px 28px;
  margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.dash-header h2 { font-size: 20px; color: #1a1a2e; }
.dash-stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px; margin-bottom: 20px;
}
.stat-card {
  background: #fff; border-radius: 10px; padding: 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center;
}
.stat-card .stat-num { font-size: 28px; font-weight: 700; color: #4a6cf7; }
.stat-card .stat-label { font-size: 13px; color: #999; margin-top: 4px; }
.dash-section {
  background: #fff; border-radius: 12px; padding: 20px 28px;
  margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  overflow-x: auto;
}
.dash-section h3 { font-size: 16px; color: #333; margin-bottom: 14px; }
.dash-toolbar {
  display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap;
}
.dash-toolbar select, .dash-toolbar button {
  padding: 8px 16px; border-radius: 8px; font-size: 13px;
  border: 1.5px solid #ddd; background: #fff; cursor: pointer;
}
.dash-toolbar button { border-color: #4a6cf7; color: #4a6cf7; }
.dash-toolbar button:hover { background: #f0f4ff; }
.dash-toolbar button.danger { border-color: #e74c3c; color: #e74c3c; }
.dash-toolbar button.danger:hover { background: #fef0f0; }
.dash-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
  min-width: 600px;
}
.dash-table th, .dash-table td {
  padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee;
}
.dash-table th { background: #f8f9fc; font-weight: 600; color: #555; white-space: nowrap; }
.dash-table tr:hover td { background: #fafbff; }
.dash-table .score-high { color: #27ae60; font-weight: 600; }
.dash-table .score-mid { color: #f39c12; font-weight: 600; }
.dash-table .score-low { color: #e74c3c; font-weight: 600; }
.empty-state {
  text-align: center; padding: 40px 20px; color: #999; font-size: 14px;
}
/* Login modal */
.login-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); display: flex; align-items: center;
  justify-content: center; z-index: 1000;
}
.login-box {
  background: #fff; border-radius: 12px; padding: 32px 28px;
  width: 340px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.login-box h3 { font-size: 18px; margin-bottom: 16px; text-align: center; }
.login-box .input-field { margin-bottom: 12px; }
.login-box .btn-row { display: flex; gap: 10px; margin-top: 16px; }
.login-box .btn-row button { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
.login-box .btn-primary { background: #4a6cf7; color: #fff; }
.login-box .btn-cancel { background: #eef0f7; color: #555; }
.login-box .error-msg { color: #e74c3c; font-size: 12px; text-align: center; margin-top: 4px; }
/* Password change */
.pwd-row { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
.pwd-row input { flex: 1; }
.pwd-row button { white-space: nowrap; }
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 10px 24px;
  border-radius: 8px; font-size: 14px; z-index: 2000;
  opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }

/* Anti-cheat */
.anti-cheat-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  background: #fff3cd; color: #856404; text-align: center;
  padding: 8px 16px; font-size: 14px; font-weight: 600;
  border-bottom: 2px solid #ffc107;
}
.cheat-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; color: #fff;
}
.cheat-overlay .cheat-icon { font-size: 48px; margin-bottom: 16px; }
.cheat-overlay .cheat-text { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.cheat-overlay .cheat-sub { font-size: 14px; color: #ccc; }
.cheat-overlay .cheat-btn {
  margin-top: 20px; padding: 10px 32px; border-radius: 8px;
  background: #ffc107; color: #333; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
}
.cheat-warning-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 10000;
  display: flex; align-items: center; justify-content: center;
}
.cheat-warning-box {
  background: #fff; border-radius: 12px; padding: 32px 28px;
  max-width: 400px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.cheat-warning-box h3 { color: #e74c3c; font-size: 18px; margin-bottom: 12px; }
.cheat-warning-box p { color: #555; font-size: 14px; margin-bottom: 8px; line-height: 1.6; }
.cheat-warning-box button {
  margin-top: 16px; padding: 10px 32px; border-radius: 8px;
  background: #4a6cf7; color: #fff; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
}
</style>
</head>

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    let tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
}

      <a href="javascript:void(0)" onclick="showAdminLogin()">成绩管理</a>
    </div>
  </div>`;

  window.scrollTo(0, 0);
}

function startTest(subject) {
  currentSubject = subject;
  testActive = true;
  tabSwitchCount = 0;
  cheatWarningShown = false;
  // Remove any lingering overlay
  let oldOverlay = document.getElementById('cheatOverlay');
  if (oldOverlay) oldOverlay.remove();
  let oldWarning = document.getElementById('cheatWarning');
  if (oldWarning) oldWarning.remove();

  // Deep copy and shuffle
  let rawQuestions = JSON.parse(JSON.stringify(SUBJECT_DATA[subject]));

  // Separate by type
  let infoItems = [], singleChoice = [], fillBlank = [], shortAnswer = [];
  for (let q of rawQuestions) {
    if (q.score === 0) infoItems.push(q);
    else if (q.type === '单选题') singleChoice.push(q);
    else if (q.type === '填空题') fillBlank.push(q);
    else if (q.type === '简答题') shortAnswer.push(q);
  }

  // 3. 随机排序单选题和填空题
  shuffleArray(singleChoice);
  shuffleArray(fillBlank);

  // 4. 随机排列单选题选项（答案对应调整）
  for (let q of singleChoice) {
    // Build mapping: original index -> option text
    let pairs = q.options.map(function(opt, i) {
      return { text: opt, letter: String.fromCharCode(65 + i) };
    });
    let originalAnswerLetter = q.answer;
    let originalAnswerIndex = originalAnswerLetter.charCodeAt(0) - 65;
    let answerText = q.options[originalAnswerIndex];
    shuffleArray(pairs);
    q.options = pairs.map(function(p) { return p.text; });
    // Find new letter for answer
    for (let i = 0; i < pairs.length; i++) {
      if (pairs[i].text === answerText) {
        q.answer = String.fromCharCode(65 + i);
        break;
      }
    }
  }

  // Reassemble: infoItems -> singleChoice -> fillBlank -> shortAnswer
  currentQuestions = infoItems.concat(singleChoice, fillBlank, shortAnswer);

  let html = `
<div class="test-container">
  <div class="anti-cheat-banner">诚信考试，系统将记录切屏行为</div>
  <div class="test-header" style="margin-top:42px;">
    <h2>${SUBJECT_ICONS[subject] || ''} ${subject} - 课标测试</h2>
    <button class="back-btn" onclick="endTest()">← 返回首页</button>
  </div>`;

  // Group questions by type
  let singleChoice = [];
  let fillBlank = [];
  let shortAnswer = [];
  let infoItems = [];

  for (let q of currentQuestions) {
    if (q.score === 0) {
      infoItems.push(q);
    } else if (q.type === '单选题') {
      singleChoice.push(q);
    } else if (q.type === '填空题') {
      fillBlank.push(q);
    } else if (q.type === '简答题') {
      shortAnswer.push(q);
    }
  }

  // Info section (name, ID, subject confirm)
  if (infoItems.length > 0) {
    html += `<div class="section">
      <div class="section-title">考生信息</div>`;
    for (let i = 0; i < infoItems.length; i++) {
      let q = infoItems[i];
      let idx = currentQuestions.indexOf(q);
      html += `<div class="question">
        <div class="q-title">${idx + 1}. ${q.title}</div>`;
      if (q.type === '填空题') {
        html += `<input type="text" class="input-field" id="q_${idx}" placeholder="请输入">`;
      } else if (q.type === '单选题') {
        html += `<div class="options">`;
        for (let j = 0; j < q.options.length; j++) {
          let letter = String.fromCharCode(65 + j);
          html += `<label><input type="radio" name="q_${idx}" value="${letter}"> ${letter}. ${q.options[j]}</label>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  // Single choice section
  if (singleChoice.length > 0) {
    html += `<div class="section">
      <div class="section-title">一、单选题（每题 4 分，共 ${singleChoice.length * 4} 分）</div>`;
    for (let q of singleChoice) {
      let idx = currentQuestions.indexOf(q);
      html += `<div class="question">
        <div class="q-title">${idx + 1}. ${q.title} <span class="q-score">(${q.score}分)</span></div>
        <div class="options">`;
      for (let j = 0; j < q.options.length; j++) {
        let letter = String.fromCharCode(65 + j);
        html += `<label><input type="radio" name="q_${idx}" value="${letter}"> ${letter}. ${q.options[j]}</label>`;
      }
      html += `</div></div>`;
    }
    html += `</div>`;
  }

  // Fill blank section
  if (fillBlank.length > 0) {
    html += `<div class="section">
      <div class="section-title">二、填空题（每题 4 分，共 ${fillBlank.length * 4} 分）</div>`;
    for (let q of fillBlank) {
      let idx = currentQuestions.indexOf(q);
      html += `<div class="question">
        <div class="q-title">${idx + 1}. ${q.title} <span class="q-score">(${q.score}分)</span></div>
        <input type="text" class="input-field" id="q_${idx}" placeholder="请输入答案">
      </div>`;
    }
    html += `</div>`;
  }

  // Short answer section
  if (shortAnswer.length > 0) {
    html += `<div class="section">
      <div class="section-title">三、简答题（每题 14 分，共 ${shortAnswer.length * 14} 分）</div>`;
    for (let q of shortAnswer) {
      let idx = currentQuestions.indexOf(q);
      html += `<div class="question">
        <div class="q-title">${idx + 1}. ${q.title} <span class="q-score">(${q.score}分)</span></div>
        <textarea class="input-field" id="q_${idx}" placeholder="请输入答案（提交后自行对照参考答案）" rows="4"></textarea>
      </div>`;
    }
    html += `</div>`;
  }

  html += `<div class="submit-wrap">
    <button class="submit-btn" onclick="submitTest()">提交答卷</button>
  </div>
  <div id="result"></div>
</div>`;

  document.getElementById('app').innerHTML = html;
  window.scrollTo(0, 0);
}

function submitTest() {
  testActive = false;
  let totalScore = 0;
  let scoredQuestions = currentQuestions.filter(q => q.score > 0);
  let autoScoreTotal = 0;
  let autoScoreGot = 0;
  let corrections = [];
  let shortAnswerRefs = [];

  for (let q of currentQuestions) {
    let idx = currentQuestions.indexOf(q);
    if (q.score === 0) continue;

    if (q.type === '单选题') {
      autoScoreTotal += q.score;
      let radios = document.getElementsByName('q_' + idx);
      let selected = null;
      for (let r of radios) {
        if (r.checked) { selected = r.value; break; }
      }
      if (selected === q.answer) {
        autoScoreGot += q.score;
        corrections.push({ title: q.title, correct: true, your: selected, answer: q.answer });
      } else {
        corrections.push({ title: q.title, correct: false, your: selected || '未作答', answer: q.answer });
      }
    } else if (q.type === '填空题') {
      autoScoreTotal += q.score;
      let input = document.getElementById('q_' + idx);
      let val = (input?.value || '').trim();
      // Normalize comparison
      let ans = q.answer.trim();
      let correct = val === ans || val === ans.replace(/\s/g, '') || val.replace(/\s/g, '') === ans;
      if (correct) {
        autoScoreGot += q.score;
        corrections.push({ title: q.title, correct: true, your: val || '(空)', answer: ans });
      } else {
        corrections.push({ title: q.title, correct: false, your: val || '(空)', answer: ans });
      }
    } else if (q.type === '简答题') {
      shortAnswerRefs.push({ title: q.title, score: q.score, answer: q.answer });
    }
  }

  totalScore = autoScoreGot;

  let totalFull = 0;
  for (let q of scoredQuestions) {
    totalFull += q.score;
  }

  let resultHtml = `<div class="result-box">
    <h3>测试结果</h3>
    <div class="result-score">${autoScoreGot} / ${autoScoreTotal}</div>
    <div class="result-detail">
      自动评分：<span class="${autoScoreGot >= autoScoreTotal * 0.6 ? 'correct' : 'wrong'}">${autoScoreGot} 分</span> /
      自动评分满分 ${autoScoreTotal} 分
    </div>`;

  if (shortAnswerRefs.length > 0) {
    resultHtml += `<div style="margin-top:8px;font-size:13px;color:#999;">
      简答题（${shortAnswerRefs.map(r=>r.score).reduce((a,b)=>a+b,0)} 分）需自行对照参考答案评分，不计入自动评分
    </div>`;
  }

  // Corrections
  if (corrections.length > 0) {
    resultHtml += `<div class="ref-answer"><h4>答题明细</h4>`;
    for (let c of corrections) {
      let icon = c.correct ? '✓' : '✗';
      let cls = c.correct ? 'correct' : 'wrong';
      resultHtml += `<div class="correction-item">
        <span class="${cls}">${icon}</span> ${c.title}<br>
        <span style="font-size:12px;color:#888;">你的答案：${c.your} | 正确答案：${c.answer}</span>
      </div>`;
    }
    resultHtml += `</div>`;
  }

  // Short answer references
  if (shortAnswerRefs.length > 0) {
    resultHtml += `<div class="ref-answer"><h4>简答题参考答案</h4>`;
    for (let r of shortAnswerRefs) {
      resultHtml += `<div class="ref-item">
        <div class="ref-q">${r.title}（${r.score}分）</div>
        <div class="ref-a">${r.answer}</div>
      </div>`;
    }
    resultHtml += `</div>`;
  }

  resultHtml += `</div>`;

  document.getElementById('result').innerHTML = resultHtml;
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });

  // Save result to localStorage
  saveResult();
}

function saveResult() {
  // Get user info
  let nameEl = document.getElementById('q_0');
  let idEl = document.getElementById('q_1');
  let name = (nameEl?.value || '').trim() || '未填写';
  let empId = (idEl?.value || '').trim() || '未填写';

  // Calculate auto scores
  let autoScoreTotal = 0, autoScoreGot = 0;
  let singleGot = 0, singleTotal = 0;
  let fillGot = 0, fillTotal = 0;

  for (let q of currentQuestions) {
    let idx = currentQuestions.indexOf(q);
    if (q.score === 0) continue;
    if (q.type === '单选题') {
      singleTotal += q.score;
      autoScoreTotal += q.score;
      let radios = document.getElementsByName('q_' + idx);
      let selected = null;
      for (let r of radios) { if (r.checked) { selected = r.value; break; } }
      if (selected === q.answer) { autoScoreGot += q.score; singleGot += q.score; }
    } else if (q.type === '填空题') {
      fillTotal += q.score;
      autoScoreTotal += q.score;
      let input = document.getElementById('q_' + idx);
      let val = (input?.value || '').trim();
      let ans = q.answer.trim();
      if (val === ans || val === ans.replace(/\s/g, '') || val.replace(/\s/g, '') === ans) {
        autoScoreGot += q.score; fillGot += q.score;
      }
    }
  }

  let record = {
    name: name,
    empId: empId,
    subject: currentSubject,
    score: autoScoreGot,
    maxScore: autoScoreTotal,
    singleScore: singleGot + '/' + singleTotal,
    fillScore: fillGot + '/' + fillTotal,
    tabSwitches: tabSwitchCount,
    time: new Date().toLocaleString('zh-CN')
  };

  let records = JSON.parse(localStorage.getItem('test_records') || '[]');
  records.push(record);
  localStorage.setItem('test_records', JSON.stringify(records));

  // 同时写入 Supabase，失败则降级到 localStorage
  if (supabaseClient) {
    supabaseClient.from('scores').insert({
      name: name,
      employee_id: empId,
      subject: currentSubject,
      score: autoScoreGot,
      choice_score: singleGot,
      fill_score: fillGot,
      tab_switches: tabSwitchCount
    }).then(({ error }) => {
      if (error) {
        console.warn('Supabase 写入失败，已降级到 localStorage:', error.message);
        // 追加同步标记，供后续手动同步
        let pendingSync = JSON.parse(localStorage.getItem('pending_sync') || '[]');
        pendingSync.push(record);
        localStorage.setItem('pending_sync', JSON.stringify(pendingSync));
      } else {
        // 写入成功，清除该条记录的待同步标记（如果存在）
        // 标记 record 已同步
        record._synced = true;
        let allRecords = JSON.parse(localStorage.getItem('test_records') || '[]');
        allRecords[allRecords.length - 1]._synced = true;
        localStorage.setItem('test_records', JSON.stringify(allRecords));
      }
    });
  }
}

// 从 Supabase 拉取成绩数据
async function fetchFromSupabase() {
  if (!supabaseClient) return [];
  try {
    let allData = [];
    let from = 0;
    const pageSize = 1000;
    while (true) {
      const { data, error } = await supabaseClient
        .from('scores')
        .select('*')
        .range(from, from + pageSize - 1)
        .order('created_at', { ascending: false });
      if (error) {
        console.warn('Supabase 拉取失败:', error.message);
        break;
      }
      if (!data || data.length === 0) break;
      allData = allData.concat(data);
      if (data.length < pageSize) break;
      from += pageSize;
    }
    return allData;
  } catch (e) {
    console.warn('Supabase 请求异常:', e.message);
    return [];
  }
}

// 同步本地未上传数据到 Supabase
async function syncPendingToSupabase() {
  if (!supabaseClient) return { synced: 0, failed: 0 };
  let pending = JSON.parse(localStorage.getItem('pending_sync') || '[]');
  if (pending.length === 0) return { synced: 0, failed: 0 };
  let synced = 0, failed = 0;
  for (let r of pending) {
    const { error } = await supabaseClient.from('scores').insert({
      name: r.name,
      employee_id: r.empId,
      subject: r.subject,
      score: r.score,
      choice_score: parseInt((r.singleScore || '0').split('/')[0]) || 0,
      fill_score: parseInt((r.fillScore || '0').split('/')[0]) || 0,
      tab_switches: r.tabSwitches || 0
    });
    if (error) { failed++; } else { synced++; }
  }
  if (synced === pending.length) {
    localStorage.removeItem('pending_sync');
  } else {
    // 保留未成功同步的
    localStorage.setItem('pending_sync', JSON.stringify(pending.slice(synced)));
  }
  return { synced, failed };
}

// 合并本地与云端数据，按 name+employee_id+subject+score+time 去重
async function getMergedRecords() {
  let localRecords = JSON.parse(localStorage.getItem('test_records') || '[]');
  let cloudRecords = await fetchFromSupabase();

  let cloudMapped = cloudRecords.map(r => ({
    name: r.name || '',
    empId: r.employee_id || '',
    subject: r.subject || '',
    score: r.score || 0,
    maxScore: 92,
    singleScore: (r.choice_score || 0) + '/32',
    fillScore: (r.fill_score || 0) + '/40',
    time: r.created_at ? new Date(r.created_at).toLocaleString('zh-CN') : '',
    _source: 'cloud'
  }));

  let seen = new Set();
  let merged = [];
  for (let r of localRecords) {
    let key = `${r.name}|${r.empId}|${r.subject}|${r.score}`;
    if (!seen.has(key)) { seen.add(key); merged.push(r); }
  }
  for (let r of cloudMapped) {
    let key = `${r.name}|${r.empId}|${r.subject}|${r.score}`;
    if (!seen.has(key)) { seen.add(key); merged.push(r); }
  }
  return merged;
}

  if (records.length === 0) { showToast('暂无数据可导出'); return; }
  let header = '姓名,工号,学科,得分,满分,单选题得分,填空题得分,提交时间';
  let rows = records.map(r => `"${r.name}","${r.empId}","${r.subject}",${r.score},${r.maxScore},"${r.singleScore||''}","${r.fillScore||''}","${r.time}"`);
  let csv = '﻿' + header + '\n' + rows.join('\n');
  let blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url; a.download = '课标测试成绩_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('CSV 已导出');
}

async function clearAllData() {
  if (!confirm('确定要清空所有测试成绩数据吗？此操作不可恢复！')) return;
  if (!confirm('再次确认：将清空本地与云端全部成绩记录？')) return;

  // 清空本地
  localStorage.removeItem('test_records');
  localStorage.removeItem('pending_sync');

  // 清空云端
  try {
    const { error } = await supabase.from('scores').delete().neq('id', 0);
    if (error) console.warn('云端清空失败:', error.message);
  } catch (e) {
    console.warn('云端清空异常:', e);
  }

  showToast('本地与云端数据已全部清空');
  showDashboard();
}

function changePassword() {
  let newPwd = document.getElementById('newPassword').value.trim();
  if (!newPwd) { showToast('请输入新密码'); return; }
  if (newPwd.length < 3) { showToast('密码至少 3 位'); return; }
  ADMIN_PASSWORD = newPwd;
  localStorage.setItem('admin_password', newPwd);
  showToast('密码已更新');
  document.getElementById('newPassword').value = '';
}

function showToast(msg) {
  let existing = document.querySelector('.toast');
  if (existing) existing.remove();
  let t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2000);
}

// Init
showHome();
</script>
