<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入职教师课标测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f6fa;
  color: #333;
  min-height: 100vh;
}
/* Home */
.home-container {
  max-width: 720px; margin: 0 auto; padding: 40px 20px;
}
.home-header {
  text-align: center; margin-bottom: 40px;
}
.home-header h1 {
  font-size: 28px; color: #1a1a2e; margin-bottom: 8px;
}
.home-header p {
  font-size: 15px; color: #666;
}
.subject-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}
.subject-card {
  background: #fff; border-radius: 12px; padding: 28px 20px;
  text-align: center; cursor: pointer; transition: all 0.25s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 2px solid transparent;
  text-decoration: none; color: inherit; display: block;
}
.subject-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  border-color: #4a6cf7;
}
.subject-card .icon {
  font-size: 40px; margin-bottom: 10px;
}
.subject-card .name {
  font-size: 20px; font-weight: 700; color: #1a1a2e;
}
.subject-card .info {
  font-size: 13px; color: #999; margin-top: 6px;
}
/* Test */
.test-container {
  max-width: 800px; margin: 0 auto; padding: 30px 20px 60px;
}
.test-header {
  background: #fff; border-radius: 12px; padding: 24px 28px;
  margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.test-header h2 {
  font-size: 22px; color: #1a1a2e;
}
.test-header .back-btn {
  background: #eef0f7; border: none; padding: 8px 18px;
  border-radius: 8px; cursor: pointer; font-size: 14px; color: #555;
  transition: background 0.2s;
}
.test-header .back-btn:hover { background: #dde0eb; }
.section {
  background: #fff; border-radius: 12px; padding: 24px 28px;
  margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.section-title {
  font-size: 17px; font-weight: 700; color: #4a6cf7;
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 2px solid #eef0f7;
}
.question {
  margin-bottom: 22px; padding-bottom: 18px;
  border-bottom: 1px dashed #eee;
}
.question:last-child { border-bottom: none; margin-bottom: 0; }
.question .q-title {
  font-size: 15px; font-weight: 600; color: #333; margin-bottom: 10px;
}
.question .q-score {
  font-size: 12px; color: #999; font-weight: 400;
  margin-left: 6px;
}
.question .q-info {
  font-size: 12px; color: #999; margin-bottom: 6px;
}
.options label {
  display: block; padding: 8px 12px; margin: 4px 0;
  border-radius: 8px; cursor: pointer; transition: background 0.15s;
  font-size: 14px;
}
.options label:hover { background: #f0f4ff; }
.options input[type="radio"] { margin-right: 8px; }
.input-field {
  width: 100%; padding: 10px 14px; border: 1.5px solid #ddd;
  border-radius: 8px; font-size: 14px; transition: border-color 0.2s;
  font-family: inherit;
}
.input-field:focus { outline: none; border-color: #4a6cf7; }
textarea.input-field { min-height: 100px; resize: vertical; }
.submit-wrap {
  text-align: center; margin: 30px 0;
}
.submit-btn {
  background: #4a6cf7; color: #fff; border: none;
  padding: 14px 48px; border-radius: 10px; font-size: 17px;
  cursor: pointer; font-weight: 600; transition: all 0.25s;
}
.submit-btn:hover { background: #3b5de7; transform: translateY(-1px); }
.submit-btn:disabled { background: #bbb; cursor: not-allowed; transform: none; }
/* Result */
.result-box {
  background: #fff; border-radius: 12px; padding: 28px;
  margin-top: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  text-align: center;
}
.result-box h3 { font-size: 22px; margin-bottom: 12px; }
.result-score {
  font-size: 48px; font-weight: 800; color: #4a6cf7;
  margin: 10px 0;
}
.result-detail {
  font-size: 14px; color: #666; margin-top: 8px;
}
.result-detail span { font-weight: 600; }
.correct { color: #27ae60; }
.wrong { color: #e74c3c; }
.ref-answer {
  margin-top: 20px; padding: 16px; background: #f8f9fc;
  border-radius: 8px; text-align: left;
}
.ref-answer h4 { font-size: 15px; margin-bottom: 8px; color: #555; }
.ref-item {
  margin-bottom: 12px; padding-bottom: 10px;
  border-bottom: 1px solid #eee;
}
.ref-item:last-child { border-bottom: none; }
.ref-q { font-weight: 600; font-size: 14px; }
.ref-a { font-size: 13px; color: #666; margin-top: 4px; }
.correction-item {
  margin: 6px 0; font-size: 13px;
}
/* Responsive */
@media (max-width: 600px) {
  .home-header h1 { font-size: 22px; }
  .subject-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .subject-card { padding: 20px 12px; }
  .subject-card .name { font-size: 17px; }
  .test-container { padding: 16px 10px 40px; }
  .section, .test-header { padding: 16px; }
  .result-score { font-size: 36px; }
}
</style>
</head>

const SUBJECT_ICONS = {
  "语文": "📖", "数学": "📐", "英语": "🌍",
  "物理": "⚛️", "化学": "🧪", "生物": "🧬", "地理": "🌏"
};

let currentSubject = null;
let currentQuestions = [];

function showHome() {
  currentSubject = null;
  let html = `
<div class="home-container">
  <div class="home-header">
    <h1>入职教师课标测试</h1>
    <p>请选择您要参加的学科测试</p>
  </div>
  <div class="subject-grid">`;
  for (let s of Object.keys(SUBJECT_DATA)) {
    html += `
    <div class="subject-card" onclick="startTest('${s}')">
      <div class="icon">${SUBJECT_ICONS[s] || '📝'}</div>
      <div class="name">${s}</div>
      <div class="info">${SUBJECT_DATA[s].length} 题 · 满分 92 分</div>
    </div>`;
  }
  html += `</div></div>`;
  document.getElementById('app').innerHTML = html;
  window.scrollTo(0, 0);
}

function startTest(subject) {
  currentSubject = subject;
  currentQuestions = SUBJECT_DATA[subject];
  let html = `
<div class="test-container">
  <div class="test-header">
    <h2>${SUBJECT_ICONS[subject] || ''} ${subject} - 课标测试</h2>
    <button class="back-btn" onclick="showHome()">← 返回首页</button>
  </div>`;

  // Group questions by type
  let singleChoice = [];
  let fillBlank = [];
  let shortAnswer = [];
  let infoItems = [];

  for (let q of currentQuestions) {
    if (q.score === 0) {
      infoItems.push(q);
    } else if (q.type === '单选题') {
      singleChoice.push(q);
    } else if (q.type === '填空题') {
      fillBlank.push(q);
    } else if (q.type === '简答题') {
      shortAnswer.push(q);
    }
  }

  // Info section (name, ID, subject confirm)
  if (infoItems.length > 0) {
    html += `<div class="section">
      <div class="section-title">考生信息</div>`;
    for (let i = 0; i < infoItems.length; i++) {
      let q = infoItems[i];
      let idx = currentQuestions.indexOf(q);
      html += `<div class="question">
        <div class="q-title">${idx + 1}. ${q.title}</div>`;
      if (q.type === '填空题') {
        html += `<input type="text" class="input-field" id="q_${idx}" placeholder="请输入">`;
      } else if (q.type === '单选题') {
        html += `<div class="options">`;
        for (let j = 0; j < q.options.length; j++) {
          let letter = String.fromCharCode(65 + j);
          html += `<label><input type="radio" name="q_${idx}" value="${letter}"> ${letter}. ${q.options[j]}</label>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  // Single choice section
  if (singleChoice.length > 0) {
    html += `<div class="section">
      <div class="section-title">一、单选题（每题 4 分，共 ${singleChoice.length * 4} 分）</div>`;
    for (let q of singleChoice) {
      let idx = currentQuestions.indexOf(q);
      html += `<div class="question">
        <div class="q-title">${idx + 1}. ${q.title} <span class="q-score">(${q.score}分)</span></div>
        <div class="options">`;
      for (let j = 0; j < q.options.length; j++) {
        let letter = String.fromCharCode(65 + j);
        html += `<label><input type="radio" name="q_${idx}" value="${letter}"> ${letter}. ${q.options[j]}</label>`;
      }
      html += `</div></div>`;
    }
    html += `</div>`;
  }

  // Fill blank section
  if (fillBlank.length > 0) {
    html += `<div class="section">
      <div class="section-title">二、填空题（每题 4 分，共 ${fillBlank.length * 4} 分）</div>`;
    for (let q of fillBlank) {
      let idx = currentQuestions.indexOf(q);
      html += `<div class="question">
        <div class="q-title">${idx + 1}. ${q.title} <span class="q-score">(${q.score}分)</span></div>
        <input type="text" class="input-field" id="q_${idx}" placeholder="请输入答案">
      </div>`;
    }
    html += `</div>`;
  }

  // Short answer section
  if (shortAnswer.length > 0) {
    html += `<div class="section">
      <div class="section-title">三、简答题（每题 10 分，共 ${shortAnswer.length * 10} 分）</div>`;
    for (let q of shortAnswer) {
      let idx = currentQuestions.indexOf(q);
      html += `<div class="question">
        <div class="q-title">${idx + 1}. ${q.title} <span class="q-score">(${q.score}分)</span></div>
        <textarea class="input-field" id="q_${idx}" placeholder="请输入答案（提交后自行对照参考答案）" rows="4"></textarea>
      </div>`;
    }
    html += `</div>`;
  }

  html += `<div class="submit-wrap">
    <button class="submit-btn" onclick="submitTest()">提交答卷</button>
  </div>
  <div id="result"></div>
</div>`;

  document.getElementById('app').innerHTML = html;
  window.scrollTo(0, 0);
}

function submitTest() {
  let totalScore = 0;
  let scoredQuestions = currentQuestions.filter(q => q.score > 0);
  let autoScoreTotal = 0;
  let autoScoreGot = 0;
  let corrections = [];
  let shortAnswerRefs = [];

  for (let q of currentQuestions) {
    let idx = currentQuestions.indexOf(q);
    if (q.score === 0) continue;

    if (q.type === '单选题') {
      autoScoreTotal += q.score;
      let radios = document.getElementsByName('q_' + idx);
      let selected = null;
      for (let r of radios) {
        if (r.checked) { selected = r.value; break; }
      }
      if (selected === q.answer) {
        autoScoreGot += q.score;
        corrections.push({ title: q.title, correct: true, your: selected, answer: q.answer });
      } else {
        corrections.push({ title: q.title, correct: false, your: selected || '未作答', answer: q.answer });
      }
    } else if (q.type === '填空题') {
      autoScoreTotal += q.score;
      let input = document.getElementById('q_' + idx);
      let val = (input?.value || '').trim();
      // Normalize comparison
      let ans = q.answer.trim();
      let correct = val === ans || val === ans.replace(/\s/g, '') || val.replace(/\s/g, '') === ans;
      if (correct) {
        autoScoreGot += q.score;
        corrections.push({ title: q.title, correct: true, your: val || '(空)', answer: ans });
      } else {
        corrections.push({ title: q.title, correct: false, your: val || '(空)', answer: ans });
      }
    } else if (q.type === '简答题') {
      shortAnswerRefs.push({ title: q.title, score: q.score, answer: q.answer });
    }
  }

  totalScore = autoScoreGot;

  let totalFull = 0;
  for (let q of scoredQuestions) {
    totalFull += q.score;
  }

  let resultHtml = `<div class="result-box">
    <h3>测试结果</h3>
    <div class="result-score">${autoScoreGot} / ${autoScoreTotal}</div>
    <div class="result-detail">
      自动评分：<span class="${autoScoreGot >= autoScoreTotal * 0.6 ? 'correct' : 'wrong'}">${autoScoreGot} 分</span> /
      自动评分满分 ${autoScoreTotal} 分
    </div>`;

  if (shortAnswerRefs.length > 0) {
    resultHtml += `<div style="margin-top:8px;font-size:13px;color:#999;">
      简答题（${shortAnswerRefs.map(r=>r.score).reduce((a,b)=>a+b,0)} 分）需自行对照参考答案评分，不计入自动评分
    </div>`;
  }

  // Corrections
  if (corrections.length > 0) {
    resultHtml += `<div class="ref-answer"><h4>答题明细</h4>`;
    for (let c of corrections) {
      let icon = c.correct ? '✓' : '✗';
      let cls = c.correct ? 'correct' : 'wrong';
      resultHtml += `<div class="correction-item">
        <span class="${cls}">${icon}</span> ${c.title}<br>
        <span style="font-size:12px;color:#888;">你的答案：${c.your} | 正确答案：${c.answer}</span>
      </div>`;
    }
    resultHtml += `</div>`;
  }

  // Short answer references
  if (shortAnswerRefs.length > 0) {
    resultHtml += `<div class="ref-answer"><h4>简答题参考答案</h4>`;
    for (let r of shortAnswerRefs) {
      resultHtml += `<div class="ref-item">
        <div class="ref-q">${r.title}（${r.score}分）</div>
        <div class="ref-a">${r.answer}</div>
      </div>`;
    }
    resultHtml += `</div>`;
  }

  resultHtml += `</div>`;

  document.getElementById('result').innerHTML = resultHtml;
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

// Init
showHome();
</script>
